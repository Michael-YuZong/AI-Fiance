# ETF pick 快速 profile。
# 只在你明确要跑快速 / 降级版 ETF 推荐时再用，不是默认配置。
news_feeds_file: config/news_feeds.briefing_light.yaml
news_topic_search_enabled: true
skip_catalyst_dynamic_search_runtime: true
skip_fund_profile: false
etf_fund_profile_mode: light
etf_full_reanalysis_limit: 3

opportunity:
  max_scan_candidates: 30
  min_turnover: 50000000

market_context:
  skip_global_proxy: true
  skip_market_monitor: true
