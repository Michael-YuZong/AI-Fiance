    source: "Bloomberg"
    url: "https://news.google.com/rss/search?q=site:bloomberg.com+earnings+guidance+results+when:2d&hl=en-US&gl=US&ceid=US:en"
  - category: "geopolitics"
    name: "Financial Times World"
    source: "Financial Times"
    url: "https://news.google.com/rss/search?q=site:ft.com+geopolitics+markets+when:1d&hl=en-US&gl=US&ceid=US:en"
