preferences:
  preferred_sources:
    - "Reuters"
    - "Bloomberg"
    - "Financial Times"
  required_sources:
    - "Reuters"
  max_items_per_feed: 2

feeds:
  - category: "global_macro"
    name: "Reuters Global Markets"
    source: "Reuters"
    must_include: true
    url: "https://news.google.com/rss/search?q=site:reuters.com+global+markets+economy+when:1d&hl=en-US&gl=US&ceid=US:en"
  - category: "energy"
    name: "Reuters Energy"
    source: "Reuters"
    must_include: true
    url: "https://news.google.com/rss/search?q=site:reuters.com+oil+opec+energy+market+when:1d&hl=en-US&gl=US&ceid=US:en"
  - category: "geopolitics"
    name: "Reuters Geopolitics"
    source: "Reuters"
    must_include: true
    url: "https://news.google.com/rss/search?q=site:reuters.com+geopolitics+market+when:1d&hl=en-US&gl=US&ceid=US:en"
  - category: "china_macro"
    name: "Reuters China Macro"
    source: "Reuters"
    must_include: true
    url: "https://news.google.com/rss/search?q=site:reuters.com+China+economy+PBOC+when:3d&hl=en-US&gl=US&ceid=US:en"
  - category: "fed"
    name: "Reuters Fed"
    source: "Reuters"
    url: "https://news.google.com/rss/search?q=site:reuters.com+Federal+Reserve+Powell+rate+cuts+inflation+when:2d&hl=en-US&gl=US&ceid=US:en"
  - category: "earnings"
    name: "Reuters Earnings"
    source: "Reuters"
    url: "https://news.google.com/rss/search?q=site:reuters.com+earnings+results+guidance+when:2d&hl=en-US&gl=US&ceid=US:en"
  - category: "ai"
    name: "Reuters AI"
    source: "Reuters"
    url: "https://news.google.com/rss/search?q=site:reuters.com+OpenAI+Anthropic+DeepSeek+AI+model+when:3d&hl=en-US&gl=US&ceid=US:en"
  - category: "semiconductor"
    name: "Reuters Semiconductor"
    source: "Reuters"
    url: "https://news.google.com/rss/search?q=site:reuters.com+semiconductor+fab+capacity+TSMC+Intel+Samsung+when:3d&hl=en-US&gl=US&ceid=US:en"
  - category: "global_macro"
    name: "Bloomberg Markets"
    source: "Bloomberg"
    url: "https://news.google.com/rss/search?q=site:bloomberg.com+markets+economy+when:1d&hl=en-US&gl=US&ceid=US:en"
