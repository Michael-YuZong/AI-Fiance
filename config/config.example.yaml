# 最低可用配置。
# 大多数用户只需要改这个文件。
# 更细的技术参数、风险阈值和扫描门槛，请按需从
# `config/config.advanced.example.yaml` 复制到 `config/config.yaml`。

# API Keys
api_keys:
  fred: "YOUR_FRED_API_KEY"
  tushare: "YOUR_TUSHARE_TOKEN"

# 常用调度
schedule:
  daily_briefing: "07:30"
  weekly_briefing: "saturday"

# 本地存储
storage:
  db_path: "data/investment.db"
  cache_dir: "data/cache"
  cache_ttl_hours: 4

# 标的类型映射
asset_type_mapping:
  "^[0-9]{6}$": "cn_etf"
  "^[0-9]{5}$": "hk"
  "^HSTECH$": "hk_index"
  "^[A-Z]{1,5}$": "us"
  "^[A-Z]{1,2}[0-9]$": "futures"
